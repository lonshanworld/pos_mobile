allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = '../build'
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(':app')
}

// Auto-inject namespace for legacy third-party packages that predate AGP 8.x.
// Must be set SYNCHRONOUSLY inside withPlugin (before AGP's evaluation listener
// validates it). afterEvaluate is too late — AGP reads namespace during evaluation.
subprojects {
    pluginManager.withPlugin("com.android.library") {
        def manifestFile = project.file("src/main/AndroidManifest.xml")
        if (manifestFile.exists() && android.namespace == null) {
            def packageName = new groovy.xml.XmlSlurper()
                .parse(manifestFile)
                .@package
                .text()
            if (packageName) {
                android.namespace = packageName
            }
        }
    }
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
